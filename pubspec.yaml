name: chess_sms_app
description: ChessMate Pro - Premium Multi-mode Chess with AI, SMS and Bluetooth.
publish_to: 'none'
version: 1.1.0+7

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Chess Logic
  chess: 0.8.1

  # Multi-mode Logic
  another_telephony: 0.4.1
  flutter_blue_plus: 1.35.3
  multistockfish: 0.3.0

  # UI & Professional Aesthetic
  flutter_animate: 4.5.0
  google_fonts: 8.0.2
  animations: 2.0.11
  glassmorphism: 3.0.0
  
  # Utilities
  permission_handler: 11.3.1
  vibration: 3.1.8
  flutter_svg: 2.0.10+1
  shared_preferences: 2.3.4
  uuid: 4.5.1
  flutter_contacts: 1.1.9+1
  path_provider: 2.1.3
  audioplayers: 6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/chess_hero_bg.png
    - assets/sounds/move.mp3
    - assets/sounds/capture.mp3
    - assets/sounds/check.mp3
    - assets/sounds/game_over.mp3
    - assets/chess_pieces/
